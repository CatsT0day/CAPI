  itemLevelMustBeNumber: '&c[✘] &fLevel must be a number!'
  itemUsageEnchant: '&c[✘] &fUsage: &e/enchant <enchantment> <level>'


  # Vanish (/vanish)
  vanishEnabled: '&6[✔] &fYou entered &6vanish&f. You are invisible to other players.'
  vanishDisabled: '&c[✘] &fYou exited &6vanish&f.'
  noPermissionVanish: '&c[✘] &fYou do not have permission to use this command.'
  vanishBossBarTitle: '&6Invisibility Mode'

  # Sudo (/sudo)
  sudoSuccess: '&6[✔] &fCommand executed as player &e%s&f: &6%s'
  sudoTargetOffline: '&c[✘] &fTarget player &e%s&f is not online.'
  sudoCommandFailed: '&c[✘] &fFailed to perform command as player &e%s&f.'

  # Game mode messages
  gameModeMessages:
    SURVIVAL: '&a[✔] &fYou switched to &6Survival&f mode.'
    CREATIVE: '&a[✔] &fYou switched to &6Creative&f mode.'
    ADVENTURE: '&a[✔] &fYou switched to &6Adventure&f mode.'
    SPECTATOR: '&a[✔] &fYou switched to &6Spectator&f mode.'