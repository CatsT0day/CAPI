name: CatAPI
version: '1.0.0.132X-build-002-test'
main: me.catst0day.capi.CAPI
api-version: 1.16.5
description: CMI 2.0
author: CatsTOday

commands:
  warp:
    description: Teleport to a warp location
    usage: /warp <location>
    permission: catapi.warp.use
  setwarp:
    description: Set a warp location
    usage: /setwarp <name>
    permission: catapi.warp.set
  CAPI:
    description: Main commands of the CatAPI plugin
    usage: /catapi reload
    permission: catapi.reload
  Home:
    description: Home command
    usage: /home <home>
  SetHome:
    description: Home command
    usage: /home <home>
  DelHome:
    description: Home command
    usage: /home <home>
  sudo:
    description: Execute command as another player
    usage: /sudo <player> <command>
    permission: catapi.sudo
  help:
    description: Show help for CatAPI commands
    usage: /help
  tp:
    description: Teleport to a player
    usage: /tp <player>
    permission: catapi.tp
    aliases: [teleport]
  tpa:
    description: Request teleport to a player
    usage: /tpa <player>
    permission: catapi.tpa
    aliases: [teleportrequest, tpr]
  tpaccept:
    description: Accept a teleport request
    usage: /tpaccept
    permission: catapi.tpa
  tpdeny:
    description: Deny a teleport request
    usage: /tpdeny
    permission: catapi.tpa
  vanish:
    description: Enable/disable vanish mode (invisibility)
    usage: /<command>
    permission: catapi.vanish
    aliases: [v]
  enchant:
    description: Enchant an item
    usage: /<command>
    permission: catapi.enchant
    aliases: [ench]
  tphere:
    description: Teleport a player to your location
    usage: /tphere <player>
    permission: catapi.tphere
  setspawn:
    description: Set the spawn point
    usage: /setspawn
    permission: catapi.setspawn
  spawn:
    description: Teleport to the spawn point
    usage: /spawn
    permission: catapi.spawn
  spec:
    description: Spectate a player (view mode)
    usage: /spec <player>
    permission: catapi.spec
  gm:
    description: Change game mode
    usage: /gm <mode>
    permission: catapi.gm
  god:
    description: Enable/disable god mode
    usage: /god
    permission: catapi.god
  fly:
    description: Enable/disable flying
    usage: /fly
    permission: catapi.fly
  heal:
    description: Heal yourself or another player
    usage: /heal [player]
    permission: catapi.heal
  feed:
    description: Feed yourself or another player (restore hunger)
    usage: /feed [player]
    permission: catapi.feed
    aliases: [eat]
  fix:
    description: Repair items
    usage: /fix [all|hand]
    permission: catapi.fix
    aliases: [repair]
  near:
    description: Show players nearby (within a radius)
    usage: /near [radius]
    permission: catapi.near

permissions:
  catapi.*:
    description: All CatAPI permissions
    children:
      catapi.warp.*: true
      catapi.sudo: true
      catapi.reload: true
      catapi.tp: true
      catapi.vanish: true
      catapi.enchant: true
      catapi.tphere: true
      catapi.setspawn: true
      catapi.spawn: true
      catapi.spec: true
      catapi.gm: true
      catapi.god: true
      catapi.fly: true
      catapi.heal: true
      catapi.feed: true
      catapi.fix: true
      catapi.near: true
      catapi.help: true

  catapi.warp.*:
    description: All warp permissions
    children:
      catapi.warp.use: true
      catapi.warp.set: true

  catapi.warp.use:
    description: Permission to use /warp command
    default: true
  catapi.warp.set:
    description: Permission to use /setwarp command
    default: op
  catapi.sudo:
    description: Permission to use /sudo command
    default: op
  catapi.reload:
    description: Permission to reload the plugin via /catapi
    default: op
  catapi.help:
    description: Permission to use the help command
    default: true
  catapi.tp:
    description: Permission to use teleport commands
    default: op
  catapi.vanish:
    description: Allows using the vanish command
    default: op
  catapi.enchant:
    description: Allows enchanting items via command
    default: op
  catapi.tphere:
    description: Permission to use the /tphere command
    default: op
  catapi.setspawn:
    description: Permission to set the spawn point
    default: op
  catapi.spawn:
    description: Permission to teleport to the spawn
    default: true
  catapi.spec:
    description: Permission to enter spectator mode
    default: op
  catapi.gm:
    description: Permission to change game mode
    default: op
  catapi.god:
    description: Permission to enable god mode
    default: op
  catapi.fly:
    description: Permission to enable flying
    default: op
  catapi.heal:
    description: Permission to heal players
    default: op
  catapi.feed:
    description: Permission to feed players
    default: op
  catapi.fix:
    description: Permission to repair items
    default: op
  catapi.near:
    description: Permission to use the nearby players radar
    default: op
  catapi.near.radius.5:
    description: Permission to use the nearby players radar
    default: op
  catapi.cooldown.bypass:
    description: Permission to bypass cooldowns
    default: op
